<svg xmlns="http://www.w3.org/2000/svg" width="600" height="40" viewBox="0 0 600 40" fill="none">
  <defs>
    <mask id="cres" maskUnits="userSpaceOnUse" x="-6" y="-6" width="13" height="12">
      <circle cx="0" cy="0" r="5" fill="#fff"/>
      <circle cx="2" cy="0" r="4.2" fill="#000"/>
    </mask>
    <style>
      .emblem { fill: #e30a17; }                                   /* light page: Turkish red */
      @media (prefers-color-scheme: dark) { .emblem { fill: #ffffff; } }  /* dark page: white */
    </style>
  </defs>

  <!-- runway -->
  <line x1="0" y1="34" x2="450" y2="34" stroke="#8b949e" stroke-width="1.4" stroke-dasharray="9 9" opacity="0.45"/>

  <!-- Turkish crescent-and-star: flashes where the jet leaves the screen, then the loop repeats -->
  <g transform="translate(548,9)">
    <g>
      <animate attributeName="opacity" dur="7.5s" repeatCount="indefinite"
        keyTimes="0;0.88;0.93;0.985;1" values="0;0;1;1;0"/>
      <animateTransform attributeName="transform" type="scale" dur="7.5s" repeatCount="indefinite"
        keyTimes="0;0.88;0.93;0.97;1" values="0.6;0.6;1.6;1.4;1.4"/>
      <circle class="emblem" cx="0" cy="0" r="5" mask="url(#cres)"/>
      <path class="emblem" transform="translate(5.4,0)"
        d="M0.00,2.30 L-0.59,0.81 L-2.19,0.71 L-0.95,-0.31 L-1.35,-1.86 L0.00,-1.00 L1.35,-1.86 L0.95,-0.31 L2.19,0.71 L0.59,0.81 Z"/>
    </g>
  </g>

  <!-- jet: taxis (gear down), accelerates, rotates nose-up while gear retracts, climbs off top-right -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      dur="7.5s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.62;0.8;1"
      keySplines="0.4 0 0.9 0.4; 0.3 0.2 0.7 0.8; 0.2 0.6 0.4 1"
      values="-14,26; 360,26; 450,18; 640,-18"/>
    <g>
      <animateTransform attributeName="transform" type="rotate"
        dur="7.5s" repeatCount="indefinite"
        keyTimes="0;0.66;0.84;1"
        values="0 24 6; 0 24 6; -13 24 6; -21 24 6"/>
      <!-- vertical thickening (taller body, same length), anchored at the belly (y=8) -->
      <g transform="translate(0 8) scale(1 1.35) translate(0 -8)">
        <!-- landing gear: down while taxiing, retracts up into the belly during liftoff -->
        <g>
          <animate attributeName="opacity" dur="7.5s" repeatCount="indefinite"
            keyTimes="0;0.6;0.72;1" values="1;1;0;0"/>
          <animateTransform attributeName="transform" type="translate" dur="7.5s" repeatCount="indefinite"
            keyTimes="0;0.6;0.72;1" values="0 0;0 0;0 -3.5;0 -3.5"/>
          <line x1="20" y1="8" x2="20" y2="10.6" stroke="#768390" stroke-width="0.8"/>
          <circle cx="20" cy="11.3" r="1.5" fill="#22272e" stroke="#768390" stroke-width="0.4"/>
          <line x1="29" y1="8" x2="29" y2="10.6" stroke="#768390" stroke-width="0.8"/>
          <circle cx="29" cy="11.3" r="1.5" fill="#22272e" stroke="#768390" stroke-width="0.4"/>
          <line x1="42" y1="8" x2="42" y2="10.2" stroke="#768390" stroke-width="0.7"/>
          <circle cx="42" cy="10.8" r="1.2" fill="#22272e" stroke="#768390" stroke-width="0.4"/>
        </g>
        <!-- far-side wing and tail fin, faint, for a 3D read -->
        <path d="M5,4 L11.5,4 L8,-1.6 Z" fill="#5a646e"/>
        <path d="M18,4 L31,4 L15,1.6 Z" fill="#5a646e"/>
        <!-- afterburner -->
        <path d="M2,6 L-9,4.3 L-4.5,6 L-9,7.7 Z" fill="#f0883e">
          <animate attributeName="opacity" values="0.35;1;0.55;1;0.35" dur="0.22s" repeatCount="indefinite"/>
        </path>
        <path d="M1,5.2 L-5,6 L1,6.8 Z" fill="#ffd33d">
          <animate attributeName="opacity" values="0.6;1;0.7;1;0.6" dur="0.18s" repeatCount="indefinite"/>
        </path>
        <!-- fuselage: flat spine, moderate fine drooped KAAN-style nose -->
        <path d="M2,4 L43,4 L50,6.2 L42,8 L2,8 Z" fill="#adbac7"/>
        <!-- delta wing -->
        <path d="M17,8 L31,8 L13,13.5 Z" fill="#768390"/>
        <!-- tail fin -->
        <path d="M4,4 L11,4 L6,-1.5 Z" fill="#768390"/>
        <!-- bubble canopy: bulbous dome, forward near the nose, rear meets the wing -->
        <path d="M26,4 L28.5,3.0 L31.5,2.2 L35,1.9 L38.5,1.9 L41,2.5 L43,4 Z" fill="#3f5a86"/>
      </g>
    </g>
  </g>
</svg>
